    <style>
      body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; -webkit-font-smoothing: antialiased; }
      
      /* Otimização de Scroll - Visibilidade Reforçada */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
      ::-webkit-scrollbar-thumb { 
        background: #10b981; 
        border-radius: 10px; 
        border: 3px solid #f1f5f9;
        box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
      }
      ::-webkit-scrollbar-thumb:hover { background: #059669; }

      /* Classe específica para scrollbars em elementos escuros ou modais */
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-color: transparent; }

      /* Portal de Impressão Otimizado para Produção */
      @media screen {
        #printable-portal { 
          position: fixed;
          width: 1200px;
          height: auto;
          left: -9999px; /* Move para fora da tela em vez de translateY */
          top: 0;
          background: white;
          visibility: visible;
          opacity: 1; /* Mantém opacidade 1 para captura correta */
          pointer-events: none;
          z-index: -9999;
          contain: paint;
        }
      }

      @media print {
        #root { display: none !important; }
        #printable-portal { 
          display: block !important; 
          opacity: 1 !important; 
          visibility: visible !important; 
          position: static !important;
          transform: none !important;
        }
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <div id="printable-portal" aria-hidden="true"></div>
    <script type="module" src="./index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('SW registered!', reg);
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed') {
                      if (navigator.serviceWorker.controller) {
                        // New content is available; please refresh.
                        console.log('New content available, reloading...');
                        window.location.reload();
                      }
                    }
                  };
                }
              };
            })
            .catch(err => console.log('SW registration failed!', err));
        });

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            window.location.reload();
            refreshing = true;
          }
        });
      }
    </script>
  </body>
